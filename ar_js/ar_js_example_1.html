<!doctype HTML>
<html>
<head>
  <script src="js/aframe/aframe.min.js"></script>
  <script src="js/aframe-ar.min.js"></script>


  <script src="https://cdn.rawgit.com/donmccurdy/aframe-extras/cfe5f316/dist/aframe-extras.js"></script>

</head>

  <body style='margin : 0px; overflow: hidden;'>

    <a-scene embedded arjs>
      <a-assets>
        <a-asset-item id="cesium" src="images/CesiumMan.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
          <!-- <a-box position='0 0.5 0' material='color: yellow;'></a-box> -->

          <a-entity gltf-model="#cesium"
            rotation="-90 0 0"
            position="0 0 2"
            animation-mixer
            animation="property: object3D.position.x; to: 3; dir: alternate; dur: 5000; loop: true"
          ></a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
