<html>
  <head>
    <script src="https://aframe.io/releases/0.9.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>

  <body>
    <script>
      AFRAME.registerComponent('scale-on-mouseenter', {
        schema: {
          to: {default: "3.5 3.5 3.5", type: "vec3"},
          from: {default: "1.5 1.5 1.5", type: "vec3"}
        },

        init: function () {
          var data = this.data;
          // console('Data Here:')
          // console.log(data);
          this.el.addEventListener('mouseenter', function () {
            this.el.object3D.scale.copy(data.to);
          });

          this.el.addEventListener('mouseleave', function () {
            this.el.object3D.scale.copy(data.from);
          });
        }
      });
    </script>

    <a-scene>

      <a-assets>
        <img id="boxTexture" src="https://i.imgur.com/mYmmbrp.jpg" crossorigin="anonymous">
        <img id="skyTexture" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg" crossorigin="anonymous">
        <!-- <audio src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" autoplay preload></audio> -->
      </a-assets>
      <a-sound src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" autoplay="true"
        position="0 0 0">
      </a-sound>

      <a-box src="https://i.imgur.com/mYmmbrp.jpg" rotation="0 45 45" scale="1 1 1" position="0 2 -5"
        animation="property: object3D.position.y; to: 3; dir: alternate; dur: 2000; loop: true"
        scale-on-mouseenter
      ></a-box>
      <!-- animation__mouseenter="property: scale; to: 2 2 2; dur: 300; startEvents: mouseenter"
      animation__mouseleave="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave" -->




      <!-- Out of the box environment! -->
      <a-entity
        text="value: Hello, A-Frame!; color: #BBB"
        position="-3 1 4"
        scale="1.5 1.5 1.5">
      </a-entity>

      <!-- <a-entity environment="preset: forest; dressingAmount: 500"></a-entity> -->

      <a-sky src="#skyTexture"></a-sky>
      <!-- <a-plane rotation="-90 0 0" width="30" height="30" position="0 0.5 0" repeat="10 10"></a-plane> -->

      <a-light type="ambient" color="#445451"></a-light>
      <a-light type="point" intensity="0.5" position="2 4 4"></a-light>

      <a-camera>
        <a-cursor></a-cursor>
      </a-camera>

    </a-scene>

  </body>
</html>
